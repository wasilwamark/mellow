image: archlinux
packages:
  - go
  - goreleaser
sources:
  - https://git.sr.ht/~wasilwa/mellow

artifacts:
  - mellow-release.tar.gz
tasks:
  - setup: |
      cd mellow
      go mod download
  - build: |
      cd mellow
      go build ./...
  - release: |
      cd mellow
      if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
        goreleaser release --clean --skip=publish
      elif [ "$GIT_REF" = "refs/heads/main" ]; then
        git tag "v$(date +'%Y%m%d%H%M%S')"
        goreleaser release --clean --skip=publish
      else
        goreleaser release --clean --snapshot --skip=publish
      fi
      tar -czf ../mellow-release.tar.gz dist/
