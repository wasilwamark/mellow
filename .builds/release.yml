image: ubuntu/lts
packages:
  - go
  - goreleaser
sources:
  - https://git.sr.ht/~wasilwa/mellow
secrets:
  # Add your secret containing GITHUB_TOKEN (needed for goreleaser to publish to GitHub if desired)
  - 00000000-0000-0000-0000-000000000000
tasks:
  - setup: |
      cd mellow
      go mod download
  - build: |
      cd mellow
      go build ./...
  - release: |
      cd mellow
      if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
        goreleaser release --clean
      elif [ "$GIT_REF" = "refs/heads/main" ]; then
        git tag "v$(date +'%Y%m%d%H%M%S')"
        goreleaser release --clean
      else
        goreleaser build --clean --snapshot
      fi
